<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>Smart Tech Test Form</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>ٹیسٹ فارم</h2>
    <!-- یہاں بعد میں n8n کا ویب ہک یو آر ایل ڈالیں گے -->

        <input type="text" name="username" placeholder="آپ کا نام" required>
        <input type="email" name="useremail" placeholder="ای میل ایڈریس" required>
        <button type="submit">ڈیٹا بھیجیں</button>
    </form>
</div>

</body>
</html>
